name: Tests & Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build tokens
        run: pnpm build:tokens

      - name: Lint (ESLint + jsx-a11y)
        run: npx eslint packages/components/src/ --max-warnings 50

      - name: Run unit tests
        run: pnpm test

      - name: Validate tokens
        run: pnpm validate:tokens

      - name: Analyze CSS
        run: pnpm analyze:css

      - name: Deploy Storybook
        if: github.ref == 'refs/heads/main'
        run: |
          EXEC_ID=$(curl -s --unix-socket /var/run/docker.sock \
            -H "Content-Type: application/json" \
            -d '{"Cmd":["sh","-c","cd /app && git pull origin main"],"AttachStdout":true,"AttachStderr":true}' \
            http://localhost/containers/nordlig-storybook/exec | python3 -c "import json,sys; print(json.load(sys.stdin)['Id'])")
          curl -s --unix-socket /var/run/docker.sock \
            -H "Content-Type: application/json" \
            -d '{"Detach":false}' \
            "http://localhost/exec/$EXEC_ID/start"
