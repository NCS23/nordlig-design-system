name: Tests & Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build tokens and components
        run: pnpm build:tokens && pnpm --filter @nordlig/components build

      - name: Lint (ESLint + jsx-a11y)
        run: npx eslint packages/components/src/ --max-warnings 10

      - name: Run unit tests
        run: pnpm test

      - name: Validate tokens
        run: pnpm validate:tokens

      - name: Analyze CSS
        run: pnpm analyze:css

      - name: Deploy Storybook
        if: ${{ github.event_name == 'push' && matrix.node-version == '20' }}
        run: |
          echo "Updating nordlig-storybook container..."

          # Helper: exec a command in the storybook container and capture output
          docker_exec() {
            local CMD="$1"
            local RESP=$(curl -s --unix-socket /var/run/docker.sock \
              -H "Content-Type: application/json" \
              -d "{\"Cmd\":[\"sh\",\"-c\",\"$CMD\"],\"AttachStdout\":true,\"AttachStderr\":true}" \
              http://localhost/containers/nordlig-storybook/exec)
            local EID=$(echo "$RESP" | python3 -c "import json,sys; print(json.load(sys.stdin)['Id'])")
            curl -s --unix-socket /var/run/docker.sock \
              -H "Content-Type: application/json" \
              -d '{"Detach":false}' \
              "http://localhost/exec/$EID/start" 2>&1
          }

          # Git pull to update source, then verify
          echo "Running git pull..."
          docker_exec "git config --global --add safe.directory /app && cd /app && git pull origin main 2>&1"
          echo "Verifying deploy..."
          docker_exec "git config --global --add safe.directory /app && cd /app && git log --oneline -1 2>&1"

          echo "Deploy complete."
