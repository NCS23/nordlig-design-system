name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build tokens and components
        run: pnpm build:tokens && pnpm --filter @nordlig/components build

      # Bundle Size Checks
      - name: Check component bundle size
        run: |
          # Measure only JS output (excluding sourcemaps and .d.ts)
          SIZE=$(find packages/components/dist -name '*.mjs' -o -name '*.js' | grep -v '.map' | xargs cat 2>/dev/null | wc -c)
          SIZE_KB=$((SIZE / 1024))
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Components JS bundle: **${SIZE_KB}KB**" >> $GITHUB_STEP_SUMMARY
          if [ "$SIZE_KB" -gt 2048 ]; then
            echo "::error::Component JS bundle exceeds 2048KB limit (${SIZE_KB}KB)"
            exit 1
          fi
          echo "Components JS: ${SIZE_KB}KB (limit: 2048KB)"

      - name: Check Figma plugin bundle size
        run: |
          if [ -f packages/figma-plugin/plugin/dist/code.js ]; then
            SIZE=$(wc -c < packages/figma-plugin/plugin/dist/code.js)
            SIZE_KB=$((SIZE / 1024))
            echo "Figma plugin: **${SIZE_KB}KB**" >> $GITHUB_STEP_SUMMARY
            if [ "$SIZE_KB" -gt 150 ]; then
              echo "::error::Figma plugin exceeds 150KB limit (${SIZE_KB}KB)"
              exit 1
            fi
            echo "Figma plugin: ${SIZE_KB}KB (limit: 150KB)"
          else
            echo "Figma plugin not built (skipped)"
          fi

      - name: Check tokens CSS size
        run: |
          if [ -f packages/styles/dist/tokens.css ]; then
            SIZE=$(wc -c < packages/styles/dist/tokens.css)
            SIZE_KB=$((SIZE / 1024))
            echo "Tokens CSS: **${SIZE_KB}KB**" >> $GITHUB_STEP_SUMMARY
            echo "Tokens CSS: ${SIZE_KB}KB"
          fi

      # Storybook Build
      - name: Build Storybook
        run: pnpm --filter @nordlig/storybook build

      - name: Upload Storybook artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: storybook-preview
          path: apps/storybook/storybook-static/
          retention-days: 7

      # Playwright Tests (a11y + visual)
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run accessibility and visual tests
        run: npx playwright test --update-snapshots

      - name: Commit updated snapshots
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/visual/__screenshots__/
          if git diff --staged --quiet; then
            echo "No snapshot changes"
          else
            git commit -m "chore: update visual snapshots for Linux CI"
            git push
          fi

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 14

      - name: Upload visual test screenshots
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: visual-test-screenshots
          path: tests/visual/__screenshots__/
          retention-days: 14
