name: Tests & Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build tokens and components
        run: pnpm build:tokens && pnpm --filter @nordlig/components build

      - name: Lint (ESLint + jsx-a11y)
        run: npx eslint packages/components/src/ --max-warnings 10

      - name: Run unit tests with coverage
        run: pnpm --filter @nordlig/components test:coverage

      - name: Validate tokens
        run: pnpm validate:tokens

      - name: Analyze CSS
        run: pnpm analyze:css
