name: Tests & Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build tokens and components
        run: pnpm build:tokens && pnpm --filter @nordlig/components build

      - name: Lint (ESLint + jsx-a11y)
        run: npx eslint packages/components/src/ --max-warnings 10

      - name: Run unit tests with coverage
        run: pnpm --filter @nordlig/components vitest run --coverage --coverage.reporter=json-summary --coverage.reporter=text

      - name: Coverage Summary
        if: always()
        run: |
          if [ -f packages/components/coverage/coverage-summary.json ]; then
            echo "## NDS Component Coverage" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            node -e "
              const c = require('./packages/components/coverage/coverage-summary.json').total;
              const fmt = (v) => v.pct >= 80 ? '✅' : v.pct >= 60 ? '⚠️' : '❌';
              console.log('| Metric | Coverage | Status |');
              console.log('|--------|----------|--------|');
              console.log('| Statements | ' + c.statements.pct + '% | ' + fmt(c.statements) + ' |');
              console.log('| Branches | ' + c.branches.pct + '% | ' + fmt(c.branches) + ' |');
              console.log('| Functions | ' + c.functions.pct + '% | ' + fmt(c.functions) + ' |');
              console.log('| Lines | ' + c.lines.pct + '% | ' + fmt(c.lines) + ' |');
              console.log('');
              console.log('**Total Tests:** ' + Object.keys(require('./packages/components/coverage/coverage-summary.json')).length - 1 + ' files covered');
            " >> $GITHUB_STEP_SUMMARY || true
          fi

      - name: Validate tokens
        run: pnpm validate:tokens

      - name: Analyze CSS
        run: pnpm analyze:css
