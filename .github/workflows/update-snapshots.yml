name: Update Visual Snapshots

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to update snapshots on'
        required: true
        default: 'feature/159-token-splitting'

jobs:
  update-snapshots:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build tokens and components
        run: pnpm build:tokens && pnpm --filter @nordlig/components build

      - name: Build Storybook
        run: pnpm --filter @nordlig/storybook build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Update snapshots
        run: npx playwright test --update-snapshots

      - name: Commit updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/visual/__screenshots__/
          if git diff --staged --quiet; then
            echo "No snapshot changes"
          else
            git commit -m "chore: update visual snapshots for Linux CI"
            git push
          fi
