name: Figma Export
description: Figma Plugin Export fuer eine Komponente erstellen oder fixen
title: "[FIGMA] Komponentenname"
labels:
  - type/figma
body:
  - type: markdown
    attributes:
      value: |
        ## Figma Export Story
        Folgt der DoR-FE / DoD-FE Checkliste.

  - type: dropdown
    id: priority
    attributes:
      label: Prioritaet
      options:
        - P1 (kritisch)
        - P2 (wichtig)
        - P3 (nice-to-have)
    validations:
      required: true

  - type: input
    id: component
    attributes:
      label: Komponente
      placeholder: "Button, Checkbox, ..."
    validations:
      required: true

  - type: input
    id: prefix
    attributes:
      label: Token-Prefix
      placeholder: "btn, checkbox, ..."
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Beschreibung
      description: "Was muss exportiert/gefixt werden?"
    validations:
      required: true

  - type: textarea
    id: current_bindings
    attributes:
      label: Aktueller Binding-Stand
      description: "Wieviele Bindings existieren, welche fehlen?"
      placeholder: |
        Aktuell: 8/12 Bindings
        Fehlend: lineHeight, letterSpacing, strokeWeight, minHeight

  - type: markdown
    attributes:
      value: |
        ## DoD-FE Checkliste
        - [ ] Alle Kombinationen extrahiert (count pruefen, 0 FAILED)
        - [ ] ALLE tokenBindings vorhanden (gegen Button-Referenz: 12 Binding-Typen)
        - [ ] Pflicht-Bindings: paddingL/R/T/B, cornerRadius, strokeWeight, fontSize, lineHeight, letterSpacing, fontWeight, minHeight
        - [ ] SVG-Icons: hex-Farben (kein rgb()), kein width/height (nur viewBox)
        - [ ] Color-Tokens: L4-spezifisch (kein L1/L2/L3 Fallback)
        - [ ] Disabled-States: opacity statt _disabled Hack
        - [ ] Plugin baut fehlerfrei: `pnpm build:plugin`
        - [ ] Figma-Import getestet: Component Set korrekt, Variables Panel vollstaendig
